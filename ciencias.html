<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio de Ciencias — Repaso de Mía Sabrina</title>
<style>
  :root{
    --bg1:#0f766e; --bg2:#0ea5e9; --bg3:#16a34a;
    --card:#ffffff; --ink:#13343b; --muted:#5b7178;
    --accent:#0ea5e9; --accent2:#16a34a; --warn:#ef4444; --gold:#f59e0b;
    --soft:#eef6f7; --line:#d9e7e9;
    --ok:#16a34a; --okbg:#e7f6ec; --bad:#dc2626; --badbg:#fdeaea;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    min-height:100vh;padding:14px;display:flex;justify-content:center;align-items:flex-start;
  }
  .app{width:100%;max-width:860px}
  .card{background:var(--card);border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.22);overflow:hidden}
  .pad{padding:22px}
  @media(min-width:600px){.pad{padding:30px}}

  /* Top bar */
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    background:linear-gradient(90deg,#0f766e,#0ea5e9);color:#fff;padding:14px 18px}
  .topbar .title{font-weight:800;font-size:1rem;letter-spacing:.2px;flex:1;min-width:140px}
  .topbar .stat{background:rgba(255,255,255,.16);border-radius:999px;padding:6px 12px;font-weight:700;font-size:.85rem;white-space:nowrap}
  .hearts{font-size:1rem;letter-spacing:1px}
  .progress{height:10px;background:rgba(0,0,0,.08)}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#16a34a,#0ea5e9);transition:width .4s ease}

  h1{font-size:1.7rem;margin:.2em 0 .1em;color:#0f766e;line-height:1.15}
  h2{font-size:1.25rem;margin:.2em 0;color:#0f766e}
  .sub{color:var(--muted);margin:.2em 0 1em}
  p{line-height:1.55}

  .btn{cursor:pointer;border:none;border-radius:14px;padding:14px 20px;font-size:1rem;font-weight:800;
    background:linear-gradient(90deg,#0ea5e9,#16a34a);color:#fff;transition:transform .08s, box-shadow .2s;
    box-shadow:0 6px 16px rgba(14,165,233,.35)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(1px)}
  .btn.secondary{background:#eef6f7;color:#0f766e;box-shadow:none;border:2px solid var(--line)}
  .btn.lg{width:100%;padding:16px}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

  /* Module map */
  .modgrid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:560px){.modgrid{grid-template-columns:1fr 1fr}}
  .modtile{display:flex;gap:12px;align-items:center;text-align:left;background:var(--soft);
    border:2px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;transition:.15s}
  .modtile:hover{border-color:var(--accent);transform:translateY(-2px)}
  .modtile.done{background:#e7f6ec;border-color:#9bd9af}
  .modtile.locked{opacity:.55;cursor:not-allowed}
  .modtile .emoji{font-size:1.9rem;width:44px;text-align:center}
  .modtile .mt{font-weight:800}
  .modtile .ms{font-size:.82rem;color:var(--muted)}
  .modtile .chk{margin-left:auto;font-weight:800;color:var(--ok)}

  /* Question */
  .qwrap{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .pill{display:inline-block;background:#e0f2fe;color:#075985;border-radius:999px;padding:4px 12px;font-weight:700;font-size:.78rem;margin-bottom:8px}
  .qtext{font-size:1.18rem;font-weight:700;margin:.2em 0 .8em;line-height:1.4}
  .options{display:grid;gap:10px}
  .opt{display:flex;gap:10px;align-items:center;text-align:left;background:#fff;border:2px solid var(--line);
    border-radius:14px;padding:13px 15px;cursor:pointer;font-size:1rem;transition:.12s;width:100%}
  .opt:hover{border-color:var(--accent);background:#f5fbff}
  .opt .lt{font-weight:800;color:#0ea5e9;min-width:20px}
  .opt.correct{background:var(--okbg);border-color:var(--ok)}
  .opt.wrong{background:var(--badbg);border-color:var(--bad)}
  .opt.dim{opacity:.55}
  .opt:disabled{cursor:default}

  /* TF buttons */
  .tfrow{display:flex;gap:12px}
  .tfbtn{flex:1;padding:18px;border-radius:14px;border:2px solid var(--line);background:#fff;font-weight:800;font-size:1.05rem;cursor:pointer}
  .tfbtn.v:hover{border-color:var(--ok);background:#eefaf1}
  .tfbtn.f:hover{border-color:var(--bad);background:#fdeeee}

  /* Ordering */
  .seqbank,.seqline{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
  .chip{background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 13px;cursor:pointer;font-weight:600;font-size:.95rem;transition:.12s}
  .chip:hover{border-color:var(--accent);background:#f5fbff}
  .chip.placed{background:#e0f2fe;border-color:#7dd3fc}
  .seqline{min-height:50px;background:#f3f9fa;border:2px dashed var(--line);border-radius:14px;padding:8px;align-content:flex-start}
  .seqnum{display:inline-flex;align-items:center;justify-content:center;background:#0ea5e9;color:#fff;border-radius:50%;width:22px;height:22px;font-size:.78rem;font-weight:800;margin-right:6px}

  /* Match & classify selects */
  .matchrow{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap}
  .matchrow .left{flex:1;min-width:150px;background:var(--soft);border-radius:12px;padding:11px 13px;font-weight:600;border:1px solid var(--line)}
  select{flex:1;min-width:150px;padding:11px;border-radius:12px;border:2px solid var(--line);font-size:.95rem;background:#fff;color:var(--ink)}
  select:focus{outline:none;border-color:var(--accent)}
  .matchrow.ok .left{background:var(--okbg);border-color:var(--ok)}
  .matchrow.no .left{background:var(--badbg);border-color:var(--bad)}

  /* Feedback */
  .fb{margin-top:14px;border-radius:14px;padding:14px 16px;font-size:.97rem;line-height:1.5;display:none}
  .fb.show{display:block;animation:fade .2s ease}
  .fb.good{background:var(--okbg);border:1px solid #9bd9af}
  .fb.bad{background:var(--badbg);border:1px solid #f3b4b4}
  .fb b{display:block;margin-bottom:3px}
  .fb .sci{color:#0f766e}

  .center{text-align:center}
  .emoji-big{font-size:3.2rem;margin:.1em 0}
  .badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(90deg,#fff7e6,#fde9c8);
    border:2px solid #f5c97b;color:#8a5a00;border-radius:999px;padding:8px 14px;font-weight:800;margin:5px;font-size:.9rem}
  .badgewrap{display:flex;flex-wrap:wrap;justify-content:center;margin:10px 0}

  table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.92rem}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  th{background:#0f766e;color:#fff}
  tr:nth-child(even) td{background:#f3f9fa}

  .sysline{display:flex;justify-content:space-between;gap:10px;padding:9px 12px;border-radius:10px;margin:5px 0;background:#f3f9fa;border:1px solid var(--line)}
  .sysline.good{background:#e7f6ec;border-color:#9bd9af}
  .sysline.weak{background:#fff3e6;border-color:#f5c97b}
  .sysline .score{font-weight:800}
  .papa{background:linear-gradient(90deg,#0f766e,#0ea5e9);color:#fff;border-radius:14px;padding:16px;text-align:center;font-weight:800;margin-top:14px;font-size:1.05rem}
  .foot{color:var(--muted);font-size:.8rem;text-align:center;margin-top:14px}
  .hide{display:none}
  .scorebig{font-size:3rem;font-weight:900;color:#0f766e;line-height:1}
  .ring{display:inline-block;padding:14px 22px;border-radius:18px;background:#eef6f7;margin:6px}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="topbar">
      <div class="title">🔬 Laboratorio de Ciencias · Mía Sabrina</div>
      <div class="stat">⭐ <span id="score">0</span> pts</div>
      <div class="stat hearts" id="hearts">❤️❤️❤️</div>
    </div>
    <div class="progress"><i id="bar"></i></div>
    <div class="pad" id="screen"></div>
  </div>
  <div class="foot">Ciencias Naturales · 1er Año · Repaso interactivo — Etapa 2</div>
</div>

<script>
/* ============================================================
   DATOS DEL JUEGO — Ciencias Naturales 1er Año
   ============================================================ */
const MODULES = [
  {

    badge:"Exploradora del cuerpo humano",

      {type:"match", q:"Relaciona cada sistema con su función principal:",

          ["Sistema digestivo","Transformar los alimentos en nutrientes"],
          ["Sistema renal","Filtrar la sangre y formar la orina"],

        fb:"Cada sistema tiene una tarea, pero todos trabajan en equipo para mantener el cuerpo en equilibrio (homeostasis)."},

        items:[["Alvéolos",0],["Corazón",1],["Estómago",2],["Nefrona",3],["Huesos",4],["Bronquios",0],["Arterias",1],["Vejiga",3]],
        fb:"Pista: 'renal' significa 'del riñón'. Los alvéolos y bronquios son de los pulmones; el corazón y las arterias, del circulatorio."},
      {type:"mc", q:"Completa: «El ______ es el músculo principal de la respiración; al bajar, los pulmones se expanden.»",

        answer:2, fb:"El diafragma está entre el pecho y el abdomen. Funciona como un pistón: baja para que entre aire y sube para que salga."},
      {type:"mc", q:"¿Qué estructuras componen el sistema osteoarticular?",

        answer:1, fb:"Huesos (sostén) + articulaciones (uniones) + ligamentos (unen hueso con hueso). Los músculos pertenecen al sistema muscular."},
      {type:"tf", q:"El sistema osteoarticular forma parte del aparato locomotor.",
        answer:true, correction:"Correcto: el aparato locomotor = sistema osteoarticular + sistema muscular.",

  {

    questions:[
      {type:"mc", q:"¿Qué le sucede al oxígeno cuando llega a los pulmones?",
        options:["Se convierte en dióxido de carbono","Se difunde (pasa) a la sangre","Se almacena en la tráquea","Se expulsa del cuerpo"],
        answer:1, fb:"En los alvéolos el oxígeno 'se cuela' a la sangre atravesando una pared finísima. Luego la sangre lo reparte por el cuerpo."},
      {type:"mc", q:"¿En qué estructura ocurre el intercambio gaseoso?",
        options:["En la tráquea","En los bronquios","En los alvéolos","En el diafragma"],
        answer:2, fb:"Los alvéolos son millones de bolsitas de aire con paredes muy delgadas: ahí entra el O₂ y sale el CO₂."},
      {type:"tf", q:"La arteria pulmonar transporta sangre rica en oxígeno hacia los pulmones.",
        answer:false, correction:"Falso. La arteria pulmonar lleva sangre SIN oxígeno (desoxigenada) desde el ventrículo derecho hacia los pulmones para oxigenarla.",

      {type:"mc", q:"¿Qué vaso lleva sangre oxigenada desde los pulmones hasta la aurícula izquierda?",
        options:["Arteria pulmonar","Venas cavas","Arteria aorta","Venas pulmonares"],
        answer:3, fb:"Las venas pulmonares son la excepción: aunque son venas, traen sangre 'recién oxigenada' al corazón."},
      {type:"order", q:"Ordena el recorrido de la CIRCULACIÓN MENOR (pulmonar):",
        items:["Ventrículo derecho","Arteria pulmonar","Pulmones","Venas pulmonares","Aurícula izquierda"],

      {type:"order", q:"Ordena el recorrido de la CIRCULACIÓN MAYOR (sistémica):",

      {type:"classify", q:"Clasifica según el tipo de sangre que transporta cada vaso o cavidad:",

        items:[["Venas pulmonares",0],["Arteria aorta",0],["Ventrículo izquierdo",0],["Arteria pulmonar",1],["Venas cavas",1],["Ventrículo derecho",1]],
        fb:"El lado izquierdo del corazón maneja sangre oxigenada; el derecho, desoxigenada."},
      {type:"mc", q:"¿Qué producto de desecho gaseoso eliminamos al exhalar?",
        options:["Oxígeno","Nutrientes","Dióxido de carbono","Agua pura"],
        answer:2, fb:"Inhalas oxígeno (lo bueno) y exhalas dióxido de carbono (la 'basura gaseosa' de las células)."}

  },
  {
    id:"m3", system:"Digestión y sistema renal", emoji:"🍎",
    name:"Módulo 3 — Digestión y riñón",
    desc:"Digestión mecánica/química y formación de la orina.",
    badge:"Maestra de la digestión y los riñones",
    questions:[
      {type:"tf", q:"La digestión mecánica descompone químicamente los alimentos usando jugos ácidos y enzimas en el estómago.",

      {type:"tf", q:"Las enzimas digestivas son grasas que ayudan a la digestión.",

        fb:"Como un colador: primero pasa de todo (filtración), luego se rescata lo bueno (reabsorción) y al final se bota lo que sobra (excreción)."},
      {type:"match", q:"Relaciona cada parte del sistema urinario con su función:",
        pairs:[
          ["Riñón","Filtra la sangre y forma la orina"],
          ["Uréter","Lleva la orina del riñón a la vejiga"],
          ["Vejiga","Almacena la orina"],
          ["Uretra","Expulsa la orina al exterior"],
          ["Nefrona","Unidad microscópica que filtra la sangre"]
        ],
        fb:"Cada parte tiene su función; el riñón limpia, la vejiga guarda y la uretra expulsa."},
      {type:"mc", q:"Si la etapa de REABSORCIÓN dejara de funcionar en la nefrona, ¿qué ocurriría?",

  },
  {
    id:"m4", system:"Aparato locomotor", emoji:"🦴",
    name:"Módulo 4 — Aparato locomotor",
    desc:"Huesos, músculos, articulaciones, tendones y ligamentos.",
    badge:"Arquitecta del movimiento",
    questions:[
      {type:"mc", q:"¿Qué une un TENDÓN?",
        options:["Un hueso con otro hueso","El músculo con el hueso","Dos músculos entre sí","La piel con el músculo"],

          "Los nutrientes viajan por los huesos"],
        answer:1, fb:"La sangre es el 'camión de reparto' del cuerpo: lleva muchísimas sustancias, no solo oxígeno."},
      {type:"tf", q:"Detecta el error: «Durante la sístole, el corazón se relaja y se llena de sangre proveniente de las venas cavas.»",
        answer:false, correction:"Falso. Esa es la DIÁSTOLE (relajación y llenado). La SÍSTOLE es la contracción que expulsa la sangre.",
        fb:"Sístole = aprieta y bota la sangre. Diástole = se afloja y se llena."}
    ]
  },
  {
    id:"m6", system:"Salud, hábitos y ambiente", emoji:"💚",
    name:"Módulo 6 — Salud y hábitos",
    desc:"Decide qué hábitos protegen cada sistema.",
    badge:"Guardiana de la salud",
    questions:[
      {type:"mc", q:"Mía quiere proteger su sistema respiratorio. ¿Qué hábito lo protege MÁS?",
        options:["Fumar de vez en cuando","No fumar ni vapear","Vapear solo los fines de semana","Respirar humo de cigarrillo ajeno"],
        answer:1, fb:"El humo del cigarrillo y del vapeo lleva tóxicos directo a los alvéolos delicados. Evitarlos es la mejor protección."},
      {type:"mc", q:"¿Qué hábito protege mejor al sistema circulatorio (el corazón)?",
        options:["Comer mucha sal y grasa","Estar siempre sentado","Hacer ejercicio y comer saludable","Dormir muy poco"],
        answer:2, fb:"El ejercicio fortalece el corazón y la buena alimentación evita que se tapen las arterias."},
      {type:"mc", q:"Causa y consecuencia: vivir muchos años con aire muy contaminado puede provocar...",
        options:["Más fuerza en los músculos","Daño en los alvéolos y menos oxígeno en la sangre","Huesos más largos","Mejor digestión"],
        answer:1, fb:"Las partículas inflaman y destruyen los alvéolos: entra menos oxígeno y aparece cansancio, tos y enfermedades respiratorias."},
      {type:"tf", q:"El vapeo es inofensivo: no le hace daño a los pulmones.",
        answer:false, correction:"Falso. El vapeo también daña los alvéolos y la salud respiratoria; no es inofensivo.",
        fb:"Aunque se vea 'moderno', el vapor lleva sustancias que lastiman los pulmones."},
      {type:"mc", q:"¿Por qué el tabaquismo y el vapeo son tan dañinos para los alvéolos?",
        options:[
          "Porque los alvéolos son muy grandes y resistentes",
          "Porque llevan tóxicos concentrados directo a unos alvéolos muy delicados, y además es un hábito evitable",
          "Porque enfrían el aire",
          "Porque no llega oxígeno al estómago"],
        answer:1, fb:"A diferencia de la contaminación (más diluida y difícil de controlar), fumar acerca la fuente de daño directo a los pulmones, y se puede evitar."},
      {type:"mc", q:"Mini decisión: ¿cuál de estos hábitos cuida tu sistema renal (los riñones)?",
        options:["Tomar suficiente agua cada día","Aguantar mucho la sed","Comer muchísima sal","No tomar agua"],
        answer:0, fb:"El agua ayuda a los riñones a filtrar la sangre y formar la orina para eliminar los desechos."}
    ]
  },
  {
    id:"final", system:"Laboratorio final", emoji:"🏆",
    name:"Laboratorio de Ciencias — Reto final",
    desc:"Mezcla de todo: selección, V/F, ordenar, relacionar y refutación.",
    badge:"Genio del Laboratorio",
    questions:[
      {type:"mc", q:"¿Cuál es la unidad estructural y funcional del riñón que filtra la sangre?",
        options:["Alvéolo","Nefrona","Neurona","Osteoblasto"],
        answer:1, fb:"La nefrona es el 'filtro chiquitico' del riñón; hay más de un millón en cada uno."},
      {type:"tf", q:"Al inhalar, el diafragma se contrae y baja para que los pulmones se expandan.",
        answer:true, correction:"Correcto: el diafragma baja al inhalar (entra aire) y sube al exhalar (sale aire).",
        fb:"Funciona como un pistón debajo de los pulmones."},
      {type:"match", q:"Relaciona cada enzima con lo que descompone:",
        pairs:[
          ["Proteasa","Proteínas → aminoácidos"],
          ["Amilasa","Carbohidratos → glucosa"],
          ["Lipasa","Grasas → ácidos grasos"]
        ],
        fb:"Cada enzima tiene su 'especialidad'. ¡No confundas la proteasa con la lipasa!"},
      {type:"order", q:"Ordena las tres etapas de la formación de la orina:",
        items:["Filtración","Reabsorción","Excreción"],
        fb:"Filtrar todo, rescatar lo útil y botar lo que sobra."},
      {type:"mc", q:"Afirmación FALSA: «La digestión química ocurre solo en la boca al masticar.» ¿Mejor refutación?",
        options:[
          "Es correcta, solo se digiere en la boca",
          "Masticar es digestión mecánica; la química usa enzimas y ocurre en la boca (saliva), el estómago (jugos gástricos) y el intestino delgado",
          "El estómago no tiene jugos",
          "La digestión ocurre en los pulmones"],
        answer:1, fb:"Masticar rompe (mecánica). La digestión química con enzimas ocurre en varias partes del tubo digestivo."},
      {type:"classify", q:"Clasifica según el tipo de sangre:",
        cats:["Oxigenada","Desoxigenada"],
        items:[["Aorta",0],["Venas pulmonares",0],["Arteria pulmonar",1],["Venas cavas",1]],
        fb:"Recuerda la trampa: la arteria pulmonar lleva sangre SIN oxígeno y las venas pulmonares CON oxígeno."},
      {type:"tf", q:"La circulación mayor o sistémica lleva sangre oxigenada desde el ventrículo izquierdo hacia todo el cuerpo.",
        answer:true, correction:"Correcto: la sistémica reparte oxígeno al cuerpo desde el ventrículo izquierdo por la aorta.",
        fb:"La menor va al pulmón a oxigenar; la mayor reparte ese oxígeno al cuerpo."},
      {type:"mc", q:"¿Cómo logran funcionar y sobrevivir todos los sistemas del cuerpo?",
        options:[
          "Cada sistema trabaja solo y por separado",
          "Trabajan juntos y dependen unos de otros para mantener el equilibrio (homeostasis)",
          "Solo importa el corazón",
          "Solo importa el cerebro"],
        answer:1, fb:"El cuerpo es un equipo: si un sistema falla, los demás se ven afectados. Juntos mantienen la homeostasis."}
    ]
  }
];

/* ============================================================
   ESTADO Y MOTOR
   ============================================================ */
const POINTS=10, LIVES=3;
let state={score:0, moduleIndex:0, qIndex:0, lives:LIVES, answeredThisModule:0, correctThisModule:0,
  results:{}, badges:[], totalAnswered:0, totalCorrect:0};
let answeredLock=false;

const screen=document.getElementById('screen');
const scoreEl=document.getElementById('score');
const heartsEl=document.getElementById('hearts');
const barEl=document.getElementById('bar');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function updateTop(){
  scoreEl.textContent=state.score;
  heartsEl.innerHTML="❤️".repeat(state.lives)+"🖤".repeat(Math.max(0,LIVES-state.lives));
  let totalQ=0,done=0;
  MODULES.forEach((m,i)=>{totalQ+=m.questions.length; if(i<state.moduleIndex)done+=m.questions.length;});
  if(state.moduleIndex<MODULES.length)done+=state.qIndex;
  barEl.style.width=(totalQ?(done/totalQ*100):0)+"%";
}

/* ---------- Pantalla de inicio ---------- */
function renderStart(){
  updateTop();
  screen.innerHTML=`
    <div class="center">
      <div class="emoji-big">🔬🫀🫁</div>
      <h1>Laboratorio de Ciencias</h1>
      <p class="sub">Repaso interactivo de los sistemas del cuerpo humano · 1er Año</p>
      <p style="max-width:560px;margin:0 auto 10px">¡Hola, Mía! Vas a recorrer <b>6 módulos</b> y un <b>reto final</b>.
      Ganas <b>10 puntos</b> por cada respuesta correcta, tienes <b>3 vidas</b> por módulo
      y puedes conseguir <b>insignias</b> de científica. Después de cada respuesta verás la explicación. ¡Vamos!</p>
      <div class="badgewrap">
        <span class="badge">🧭 Exploradora del cuerpo</span>
        <span class="badge">🫁 Experta en respiración</span>
        <span class="badge">🫀 Doctora del circulatorio</span>
        <span class="badge">🧠 Científica crítica</span>
      </div>
      <button class="btn lg" style="max-width:340px" onclick="goMap()">Comenzar el repaso 🚀</button>
    </div>`;
}

/* ---------- Mapa de módulos ---------- */
function goMap(){ state.qIndex=0; renderMap(); }
function renderMap(){
  updateTop();
  let tiles="";
  MODULES.forEach((m,i)=>{
    const r=state.results[m.id];
    const done=r!==undefined;
    const cls=done?"done":"";
    const pct=done?Math.round(r.correct/r.total*100):0;
    tiles+=`<button class="modtile ${cls}" onclick="startModule(${i})">
      <span class="emoji">${m.emoji}</span>
      <span><span class="mt">${m.name}</span><br><span class="ms">${m.desc}</span></span>
      ${done?`<span class="chk">${pct}% ✓</span>`:""}
    </button>`;
  });
  const allDone=MODULES.every(m=>state.results[m.id]!==undefined);
  screen.innerHTML=`
    <h2>Elige un módulo</h2>
    <p class="sub">Puedes hacerlos en orden. Completa los 6 módulos y el reto final.</p>
    <div class="modgrid">${tiles}</div>
    ${allDone?`<div class="btnrow"><button class="btn lg" onclick="renderFinal()">Ver mi resultado final 🏁</button></div>`:""}
  `;
}

/* ---------- Inicio de módulo ---------- */
function startModule(i){
  state.moduleIndex=i; state.qIndex=0; state.lives=LIVES;
  state.answeredThisModule=0; state.correctThisModule=0;
  renderQuestion();
}

/* ---------- Render de pregunta ---------- */
function renderQuestion(){
  answeredLock=false;
  const m=MODULES[state.moduleIndex];
  const q=m.questions[state.qIndex];
  updateTop();
  let body="";
  const head=`<span class="pill">${m.emoji} ${m.name} · ${state.qIndex+1}/${m.questions.length}</span>`;

  if(q.type==="mc"){
    body=`<div class="options" id="opts">`+
      q.options.map((o,idx)=>`<button class="opt" data-i="${idx}" onclick="answerMC(${idx})"><span class="lt">${String.fromCharCode(65+idx)}</span><span>${o}</span></button>`).join("")+
      `</div>`;
  }
  else if(q.type==="tf"){
    body=`<div class="tfrow">
      <button class="tfbtn v" onclick="answerTF(true)">✔️ Verdadero</button>
      <button class="tfbtn f" onclick="answerTF(false)">✖️ Falso</button>
    </div>`;
  }
  else if(q.type==="order"){
    const shuffled=shuffle(q.items.map((t,i)=>({t,i})));
    body=`<div class="seqline" id="seqline"><span class="ms" id="seqhint" style="color:#9bb3b8">Toca las opciones en el orden correcto…</span></div>
      <div class="seqbank" id="seqbank">`+
      shuffled.map(o=>`<button class="chip" data-i="${o.i}" onclick="placeChip(this)">${o.t}</button>`).join("")+
      `</div>
      <div class="btnrow">
        <button class="btn secondary" onclick="resetOrder()">↺ Reiniciar</button>
        <button class="btn" id="checkOrder" onclick="checkOrder()" disabled>Comprobar</button>
      </div>`;
  }
  else if(q.type==="match"){
    const rights=shuffle(q.pairs.map(p=>p[1]));
    body=q.pairs.map((p,idx)=>`<div class="matchrow" id="mr${idx}">
        <div class="left">${p[0]}</div>
        <select id="sel${idx}"><option value="">— elige —</option>`+
        rights.map(r=>`<option value="${encodeURIComponent(r)}">${r}</option>`).join("")+
        `</select></div>`).join("")+
      `<div class="btnrow"><button class="btn" onclick="checkMatch()">Comprobar</button></div>`;
  }
  else if(q.type==="classify"){
    const cats=q.cats;
    body=`<p class="ms" style="margin:.2em 0 .6em;color:var(--muted)">Asigna cada elemento a su categoría:</p>`+
      shuffle(q.items.map((it,i)=>({it,i}))).map(o=>`<div class="matchrow" id="cr${o.i}">
        <div class="left">${o.it[0]}</div>
        <select id="csel${o.i}"><option value="">— elige —</option>`+
        cats.map((c,ci)=>`<option value="${ci}">${c}</option>`).join("")+
        `</select></div>`).join("")+
      `<div class="btnrow"><button class="btn" onclick="checkClassify()">Comprobar</button></div>`;
  }

  screen.innerHTML=`<div class="qwrap">
      ${head}
      <div class="qtext">${q.type==="tf"?"¿Verdadero o Falso? ":""}${q.q}</div>
      ${body}
      <div class="fb" id="fb"></div>
      <div class="btnrow hide" id="nextrow"><button class="btn lg" onclick="nextQuestion()">Continuar ➜</button></div>
    </div>`;
}

/* ---------- Lógica de respuesta ---------- */
function registerResult(correct){
  state.totalAnswered++;
  state.answeredThisModule++;
  if(correct){
    state.score+=POINTS; state.totalCorrect++; state.correctThisModule++;
  } else {
    if(state.lives>0) state.lives--;
  }
  updateTop();
}
function showFeedback(correct,extra,sci){
  const fb=document.getElementById('fb');
  fb.className="fb show "+(correct?"good":"bad");
  fb.innerHTML=`<b>${correct?"✅ ¡Correcto! (+10 puntos)":"❌ Casi… revisa esto:"}</b>
    ${extra?`<div>${extra}</div>`:""}
    <div class="sci" style="margin-top:6px">💡 ${sci}</div>`;
  document.getElementById('nextrow').classList.remove('hide');
}

function answerMC(idx){
  if(answeredLock)return; answeredLock=true;
  const q=MODULES[state.moduleIndex].questions[state.qIndex];
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach(b=>{b.disabled=true;
    const i=+b.dataset.i;
    if(i===q.answer)b.classList.add('correct');
    else b.classList.add('dim');
  });
  const correct=idx===q.answer;
  if(!correct)opts[idx].classList.add('wrong');
  registerResult(correct);
  showFeedback(correct, correct?"":("La respuesta correcta es: <b>"+q.options[q.answer]+"</b>."), q.fb);
}

function answerTF(val){
  if(answeredLock)return; answeredLock=true;
  const q=MODULES[state.moduleIndex].questions[state.qIndex];
  document.querySelectorAll('.tfbtn').forEach(b=>b.disabled=true);
  const correct=val===q.answer;
  registerResult(correct);
  showFeedback(correct, q.correction, q.fb);
}

/* Ordenar */
let orderSeq=[];
function placeChip(btn){
  if(answeredLock)return;
  if(btn.classList.contains('placed'))return;
  btn.classList.add('placed');
  orderSeq.push(+btn.dataset.i);
  const line=document.getElementById('seqline');
  const hint=document.getElementById('seqhint'); if(hint)hint.remove();
  const span=document.createElement('span');
  span.className="chip placed";
  span.innerHTML=`<span class="seqnum">${orderSeq.length}</span>${btn.textContent}`;
  line.appendChild(span);
  const q=MODULES[state.moduleIndex].questions[state.qIndex];
  if(orderSeq.length===q.items.length)document.getElementById('checkOrder').disabled=false;
}
function resetOrder(){ if(answeredLock)return; orderSeq=[]; renderQuestion(); }
function checkOrder(){
  if(answeredLock)return; answeredLock=true;
  const q=MODULES[state.moduleIndex].questions[state.qIndex];
  const correct=orderSeq.every((v,i)=>v===i);
  document.querySelectorAll('#seqbank .chip').forEach(b=>b.disabled=true);
  document.getElementById('checkOrder').disabled=true;
  const correctText=q.items.map((t,i)=>`${i+1}. ${t}`).join(" → ");
  registerResult(correct);
  showFeedback(correct, correct?"":("Orden correcto: <b>"+correctText+"</b>."), q.fb);
}

/* Relacionar */
function checkMatch(){
  if(answeredLock)return; answeredLock=true;
  const q=MODULES[state.moduleIndex].questions[state.qIndex];
  let allOk=true;
  q.pairs.forEach((p,idx)=>{
    const sel=document.getElementById('sel'+idx);
    const chosen=decodeURIComponent(sel.value||"");
    const row=document.getElementById('mr'+idx);
    sel.disabled=true;
    if(chosen===p[1]){row.classList.add('ok');}
    else{row.classList.add('no'); allOk=false; sel.style.borderColor="#dc2626";}
  });
  const sol=q.pairs.map(p=>`<b>${p[0]}</b> → ${p[1]}`).join("<br>");
  registerResult(allOk);
  showFeedback(allOk, allOk?"":("Relaciones correctas:<br>"+sol), q.fb);
}

/* Clasificar */
function checkClassify(){
  if(answeredLock)return; answeredLock=true;
  const q=MODULES[state.moduleIndex].questions[state.qIndex];
  let allOk=true;
  q.items.forEach((it,i)=>{
    const sel=document.getElementById('csel'+i);
    const row=document.getElementById('cr'+i);
    sel.disabled=true;
    if(sel.value!==""&&(+sel.value)===it[1]){row.classList.add('ok');}
    else{row.classList.add('no'); allOk=false; sel.style.borderColor="#dc2626";}
  });
  const sol=q.items.map(it=>`<b>${it[0]}</b> → ${q.cats[it[1]]}`).join("<br>");
  registerResult(allOk);
  showFeedback(allOk, allOk?"":("Clasificación correcta:<br>"+sol), q.fb);
}

/* ---------- Avanzar ---------- */
function nextQuestion(){
  orderSeq=[];
  const m=MODULES[state.moduleIndex];
  state.qIndex++;
  if(state.qIndex<m.questions.length){ renderQuestion(); }
  else{ finishModule(); }
}

function finishModule(){
  const m=MODULES[state.moduleIndex];
  const total=m.questions.length, correct=state.correctThisModule;
  state.results[m.id]={total, correct};
  const pct=Math.round(correct/total*100);
  // insignias
  const earned=[];
  if(pct>=70){ if(!state.badges.includes(m.badge)){state.badges.push(m.badge); earned.push(m.badge);} }
  if(m.badge2 && pct>=80){ if(!state.badges.includes(m.badge2)){state.badges.push(m.badge2); earned.push(m.badge2);} }
  updateTop();

  let msg,emo;
  if(pct>=90){msg="¡Excelente trabajo! Dominaste este tema.";emo="🌟";}
  else if(pct>=70){msg="¡Muy bien! Vas por buen camino.";emo="👏";}
  else if(pct>=50){msg="¡Buen intento! Repasa un poquito y lo lograrás.";emo="💪";}
  else{msg="No te preocupes: repasar es parte de aprender. ¡Inténtalo de nuevo!";emo="🌱";}

  const nextIdx=state.moduleIndex+1;
  const hasNext=nextIdx<MODULES.length;
  screen.innerHTML=`<div class="center">
    <div class="emoji-big">${emo}</div>
    <h2>${m.name} — completado</h2>
    <div class="ring"><span class="scorebig">${pct}%</span><br><span class="ms">${correct} de ${total} correctas</span></div>
    <p class="sub">${msg}</p>
    ${earned.length?`<div class="badgewrap">${earned.map(b=>`<span class="badge">🏅 ¡Insignia! ${b}</span>`).join("")}</div>`:""}
    <div class="btnrow" style="justify-content:center">
      <button class="btn secondary" onclick="renderMap()">Ver módulos</button>
      ${hasNext?`<button class="btn" onclick="startModule(${nextIdx})">Siguiente módulo ➜</button>`
              :`<button class="btn" onclick="renderFinal()">Ver resultado final 🏁</button>`}
    </div>
  </div>`;
}

/* ---------- Pantalla final ---------- */
function renderFinal(){
  let totalQ=0,totalC=0;
  MODULES.forEach(m=>{const r=state.results[m.id]; if(r){totalQ+=r.total; totalC+=r.correct;}});
  const pct=totalQ?Math.round(totalC/totalQ*100):0;
  state.qIndex=MODULES.length>0?0:0;
  barEl.style.width="100%";

  const mastered=[], weak=[];
  MODULES.forEach(m=>{
    const r=state.results[m.id]; if(!r)return;
    const p=Math.round(r.correct/r.total*100);
    (p>=70?mastered:weak).push({name:m.system, p});
  });

  let rec;
  if(pct>=90)rec="¡Felicitaciones! Tienes los temas muy bien dominados. Repasa rápido las preguntas que fallaste y estarás lista para la evaluación.";
  else if(pct>=70)rec="¡Buen nivel! Concéntrate en repasar los sistemas marcados 'a reforzar' y vuelve a jugar esos módulos.";
  else if(pct>=50)rec="Vas avanzando. Te conviene repasar con la guía resuelta los temas a reforzar y volver a intentar el juego.";
  else rec="Repasa con papá la guía resuelta, tema por tema, y vuelve a jugar. ¡Cada intento te hace mejorar!";

  let emo = pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"🌱";

  screen.innerHTML=`<div class="center">
    <div class="emoji-big">${emo}</div>
    <h1>¡Resultado final!</h1>
    <div>
      <span class="ring"><span class="scorebig">${state.score}</span><br><span class="ms">puntos totales</span></span>
      <span class="ring"><span class="scorebig">${pct}%</span><br><span class="ms">de aciertos</span></span>
      <span class="ring"><span class="scorebig">${totalC}/${totalQ}</span><br><span class="ms">respuestas correctas</span></span>
    </div>
  </div>

  <h2 style="margin-top:18px">🏅 Insignias conseguidas</h2>
  <div class="badgewrap">${state.badges.length?state.badges.map(b=>`<span class="badge">🏅 ${b}</span>`).join(""):'<span class="ms">Aún no conseguiste insignias. ¡Vuelve a jugar para ganarlas!</span>'}</div>

  <h2>✅ Sistemas dominados</h2>
  ${mastered.length?mastered.map(s=>`<div class="sysline good"><span>${s.name}</span><span class="score">${s.p}%</span></div>`).join(""):'<p class="ms">Todavía ninguno al 70%. ¡Tú puedes!</p>'}

  <h2>📌 Sistemas a reforzar</h2>
  ${weak.length?weak.map(s=>`<div class="sysline weak"><span>${s.name}</span><span class="score">${s.p}%</span></div>`).join(""):'<p class="ms">¡Ninguno! Dominaste todos los sistemas. 🎯</p>'}

  <h2>📖 Recomendación de estudio</h2>
  <p>${rec}</p>

  <div class="papa">👨‍👧 Muéstrale esta pantalla a papá para revisar juntos el resultado.</div>

  <div class="btnrow" style="justify-content:center;margin-top:16px">
    <button class="btn secondary" onclick="renderMap()">Volver a los módulos</button>
    <button class="btn" onclick="restartAll()">Jugar otra vez 🔄</button>
  </div>`;
  updateTop();
}

function restartAll(){
  state={score:0, moduleIndex:0, qIndex:0, lives:LIVES, answeredThisModule:0, correctThisModule:0,
    results:{}, badges:[], totalAnswered:0, totalCorrect:0};
  orderSeq=[];
  renderStart();
}

/* Inicio */
renderStart();
</script>
